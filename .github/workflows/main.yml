name: main
on:
    workflow_dispatch:
    schedule:
        - cron: '0 0 */2 * *'
    push:
        branches:
            - master

jobs:
    deploy:
        name: ${{ matrix.node }}
        runs-on: blacksmith-4vcpu-ubuntu-2404
        timeout-minutes: 360
        strategy:
            max-parallel: 4
            matrix:
                node: [latest, lts, 26, 25, 24, 23, 22, 21, 20, 19, 18, 17, 16, 15, 14, 12]
        steps:
            - name: pull repository
              uses: actions/checkout@v4
              id: repository

            - name: setup docker qemu
              uses: docker/setup-qemu-action@v3
              id: qemu

            - name: Setup Blacksmith Builder
              uses: useblacksmith/setup-docker-builder@v1

            - name: install dependencies
              id: dependencies
              run: |
                  sudo apt install jq -y

            - name: update repository
              id: update-repository
              run: |
                  git pull origin master

            - name: install bun
              id: bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: 1.3.13

            - name: build and push the docker container image
              id: build
              run: |
                  bun install
                  bun run build.ts ${{ matrix.node }}

                  git config user.name 'github-actions[bot]'
                  git config user.email 'github-actions[bot]@users.noreply.github.com'

                  git add ${{ matrix.node }}/Dockerfile

                  if git diff --cached --quiet; then
                    echo "No changes in Dockerfile, skipping…"
                  else
                    git commit -m "Update ${{ matrix.node }} Dockerfile"
                    git pull origin master --rebase
                    git push origin master
                  fi
              env:
                  CONTAINER_REGISTRY_TOKEN: ${{ secrets.CONTAINER_REGISTRY_TOKEN }}
                  CONTAINER_REGISTRY_USERNAME: ${{ secrets.CONTAINER_REGISTRY_USERNAME }}
                  DOCKER_REGISTRY_TOKEN: ${{ secrets.DOCKER_REGISTRY_TOKEN }}
                  DOCKER_REGISTRY_USERNAME: ${{ secrets.DOCKER_REGISTRY_USERNAME }}
                  QUAY_REGISTRY_TOKEN: ${{ secrets.QUAY_REGISTRY_TOKEN }}
                  QUAY_REGISTRY_USERNAME: ${{ secrets.QUAY_REGISTRY_USERNAME }}
